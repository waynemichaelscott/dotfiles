# =============================================================================
# Tmux Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable true color and 256 colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",*:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Enable focus events (useful for vim)
set -g focus-events on

# Aggressive resize (useful for grouped sessions)
setw -g aggressive-resize on

# -----------------------------------------------------------------------------
# Mouse Support
# -----------------------------------------------------------------------------

set -g mouse on

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Easy splits - | for vertical, - for horizontal (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + arrow keys to switch panes (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift + arrow to switch windows (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# Resize panes with prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# -----------------------------------------------------------------------------
# Copy Mode (Vi style)
# -----------------------------------------------------------------------------

setw -g mode-keys vi

# Enter copy mode with prefix + [
bind [ copy-mode

# Vi-style selection and copy
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"

# Paste with prefix + ]
bind ] paste-buffer

# -----------------------------------------------------------------------------
# Theme - Nord-inspired colors to match Omarchy
# -----------------------------------------------------------------------------

# Pane borders
set -g pane-border-style fg=colour8
set -g pane-active-border-style fg=colour4

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour0,fg=colour7

# Status bar content
set -g status-left-length 30
set -g status-right-length 50

# Left: session name
set -g status-left "#[fg=colour0,bg=colour4,bold] #S #[fg=colour4,bg=colour0]"

# Right: hostname and time
set -g status-right "#[fg=colour8]#[fg=colour7,bg=colour8] #H #[fg=colour4]#[fg=colour0,bg=colour4,bold] %H:%M "

# Window status
set -g window-status-format "#[fg=colour7,bg=colour0] #I:#W "
set -g window-status-current-format "#[fg=colour0,bg=colour6]#[fg=colour0,bg=colour6,bold] #I:#W #[fg=colour6,bg=colour0]"

# Message style
set -g message-style bg=colour4,fg=colour0

# Mode style (copy mode)
set -g mode-style bg=colour4,fg=colour0
