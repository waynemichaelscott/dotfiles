# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Use defaults Omarchy defaults (but don't edit these directly!)
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/looknfeel.conf

#env = ANDROID_EMULATOR_USE_SYSTEM_LIBS,1
env = QT_QPA_PLATFORM,wayland;xcb
env = _JAVA_AWT_WM_NONREPARENTING,1

# --- TEMP: crash diagnostics (added 2026-07-01) ---
# Turns Hyprland's own logging on so any compositor crash writes a full
# backtrace to $XDG_RUNTIME_DIR/hypr/<sig>/hyprland.log. Added while chasing the
# recurring SIGABRT in the grouped-window-unmap + fractional-scale path.
# Safe to remove once the crash is confirmed fixed upstream.
debug {
    disable_logs = false
}

# Scratchpad — distinct look: amber border + floating panel with larger gaps
windowrule = border_color rgba(ffaa33ee) rgba(ff880066), match:workspace special:scratchpad
workspace = special:scratchpad, gapsIn:8, gapsOut:80

# Scratchpad apps — send to scratchpad silently on launch
windowrule = workspace special:scratchpad silent, match:class ^(spotify)$
windowrule = workspace special:scratchpad silent, match:class ^(chrome-web\.whatsapp\.com__.*)$

# Terminal windows — auto-group together
windowrule = group set, match:class ^(kitty)$

# Solo terminal — prevent grouping
windowrule = group deny, match:class ^(kitty-solo)$

# SSH terminals — red border to make them obvious
windowrule = border_color rgba(ff5555ee) rgba(ff555566), match:title ^(SSH:.*)$

# Android Emulator → floating (workspace pinned per-host)
windowrule = float on, match:class ^(Emulator)$

# Lazygit + Lazydocker → grouped together (workspace pinned per-host)
windowrule = group set, match:class ^(org\.omarchy\.lazygit.*)$
windowrule = group set, match:class ^(org\.omarchy\.lazydocker)$

windowrule = float on, match:class ^(xfreerdp)$
windowrule = size 3840 2160, match:class ^(xfreerdp)$
windowrule = center 1, match:class ^(xfreerdp)$

# xfreerdp shared placement (workspace pinned per-host)
windowrule = monitor 0, match:class ^(xfreerdp)$
windowrule = fullscreen on, match:class ^(xfreerdp)$

# Per-host window rules (workspace numbers depend on host layout)
source = ~/.config/hypr/window-rules*.conf

# Toggle config flags dynamically
source = ~/.local/state/omarchy/toggles/hypr/*.conf
