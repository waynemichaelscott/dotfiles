# Application definitions
$terminal = uwsm app -- xdg-terminal-exec
$browser = uwsm app -- google-chrome-stable --new-window --ozone-platform=wayland
# Define the base command for webapps
$webapp_cmd = uwsm app -- google-chrome-stable --new-window --ozone-platform=wayland --app

# Existing bindings
bindd = SUPER, return, Terminal, exec, $terminal
bindd = SUPER SHIFT, return, Terminal (ungrouped), exec, kitty --class kitty-solo
bindd = SUPER ALT, return, Tmux, exec, omarchy-launch-tui tmux
bindd = SUPER SHIFT, D, Lazydocker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Lazygit (with repo picker), exec, omarchy-launch-tui ~/.config/hypr/scripts/lazygit-pick
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window

# Chrome profiles are host-specific (profile directories differ per machine)
source = ~/.config/hypr/chrome.conf

bindd = SUPER, M, Music, exec, uwsm app -- spotify
bindd = SUPER, N, Neovim, exec, omarchy-launch-tui nvim
bindd = SUPER, C, VSCode, exec, uwsm app -- code

# TOP
# bindd = SUPER, T, Todist, exec, omarchy-launch-tui todoist
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER, P, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER CTRL, O, Toggle menu, exec, omarchy-menu toggle
bindd = SUPER, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
bindd = SUPER, Slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle

# Window groups
bindd = SUPER, bracketright, Next window in group, changegroupactive, f
bindd = SUPER, bracketleft, Previous window in group, changegroupactive, b

# Group mode submap — Super+G+G enters, then arrows to move windows into group
bind = SUPER, G, exec, notify-send -t 0 "Group Mode" "Arrow: move into group | G: toggle group | U: ungroup | Esc: cancel"
bind = SUPER, G, submap, groupmode

submap = groupmode
bind = , LEFT, moveintogroup, l
bind = , LEFT, exec, makoctl dismiss --all && notify-send -t 1500 "Group" "Moved into group (left)"
bind = , LEFT, submap, reset
bind = , RIGHT, moveintogroup, r
bind = , RIGHT, exec, makoctl dismiss --all && notify-send -t 1500 "Group" "Moved into group (right)"
bind = , RIGHT, submap, reset
bind = , UP, moveintogroup, u
bind = , UP, exec, makoctl dismiss --all && notify-send -t 1500 "Group" "Moved into group (up)"
bind = , UP, submap, reset
bind = , DOWN, moveintogroup, d
bind = , DOWN, exec, makoctl dismiss --all && notify-send -t 1500 "Group" "Moved into group (down)"
bind = , DOWN, submap, reset
bind = , G, togglegroup
bind = , G, exec, makoctl dismiss --all && notify-send -t 1500 "Group" "Toggled group"
bind = , G, submap, reset
bind = , U, moveoutofgroup
bind = , U, exec, makoctl dismiss --all && notify-send -t 1500 "Group" "Moved out of group"
bind = , U, submap, reset
bind = , escape, exec, makoctl dismiss --all
bind = , escape, submap, reset
submap = reset
bindd = SUPER ALT, mouse_down, Next window in group, changegroupactive, f
bindd = SUPER ALT, mouse_up, Previous window in group, changegroupactive, b
bindd = SUPER ALT, code:10, Switch to group window 1, changegroupactive, 1
bindd = SUPER ALT, code:11, Switch to group window 2, changegroupactive, 2
bindd = SUPER ALT, code:12, Switch to group window 3, changegroupactive, 3
bindd = SUPER ALT, code:13, Switch to group window 4, changegroupactive, 4
bindd = SUPER ALT, code:14, Switch to group window 5, changegroupactive, 5

## --- WEBAPP SUBMAP ---

# 1. Enter the submap and notify the user
bind = SUPER, A, exec, notify-send -t 0 "App Mode" "C: Claude | G: Gemini | A: Calendar | E: Email | Y: YouTube | W: WhatsApp | D: Docs | S: Sheets | Esc: Cancel"
bind = SUPER, A, submap, webapps

submap = webapps

# 2. Webapp Bindings
bind = , A, exec, $webapp_cmd="https://www.icloud.com/calendar/"
bind = , A, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching Calendar"
bind = , A, submap, reset

bind = , G, exec, $webapp_cmd="https://gemini.google.com/app"
bind = , G, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching Gemini"
bind = , G, submap, reset

bind = , C, exec, $webapp_cmd="https://claude.ai/new"
bind = , C, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching Claude"
bind = , C, submap, reset

bind = , E, exec, $webapp_cmd="https://mail.google.com/"
bind = , E, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching Email"
bind = , E, submap, reset

bind = , Y, exec, $webapp_cmd="https://youtube.com/"
bind = , Y, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching YouTube"
bind = , Y, submap, reset

bind = , W, exec, $webapp_cmd="https://web.whatsapp.com/"
bind = , W, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching WhatsApp"
bind = , W, submap, reset

bind = , D, exec, $webapp_cmd="https://docs.google.com/document/u/0/"
bind = , D, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching Google Docs"
bind = , D, submap, reset

bind = , S, exec, $webapp_cmd="https://docs.google.com/spreadsheets/u/0/"
bind = , S, exec, makoctl dismiss --all && notify-send -t 1500 "App" "Launching Google Sheets"
bind = , S, submap, reset

# 3. Escape hatch with notification
bind = , escape, exec, makoctl dismiss --all
bind = , escape, submap, reset

submap = reset
# ------------------------------------------------------------------------

# Workspace and Window management
bind = SUPER CTRL , right, workspace, +1
bind = SUPER CTRL, left, workspace, -1

bind = SUPER ALT, Up, movewindow, mon:u 
bind = SUPER ALT, Down, movewindow, mon:d 

# Reload hyperland
bindd = SUPER_SHIFT, C, Reload Config, exec, hyprctl reload && pkill waybar && hyprctl dispatch exec waybar && notify-send "Hyprland" "Config Reloaded"

# Move window to next workspace AND switch to it
bind = SUPER ALT, Right, exec, hyprctl dispatch movetoworkspace +1

# Move window to previous workspace AND switch to it
bind = SUPER ALT, Left, exec, hyprctl dispatch movetoworkspace -1

# Screenshot
bind = SUPER SHIFT, S, exec, bash -c 'grim -g "$(slurp)" - | wl-copy'
# Screenshot active window to clipboard
bindd = SUPER SHIFT, Print, Screenshot active window, exec, hyprshot -m window -m active --clipboard-only

bind = SUPER SHIFT, end, resizeactive, 0 40
bind = SUPER SHIFT, home, resizeactive, 0 -40

# Cycle 1-window aspect ratio (Off → 1:1 → 4:3 → 16:9)
bindd = SUPER CTRL SHIFT, RIGHT, Increase 1-window ratio, exec, ~/.config/hypr/scripts/cycle_single_window_ratio.sh next
bindd = SUPER CTRL SHIFT, LEFT, Decrease 1-window ratio, exec, ~/.config/hypr/scripts/cycle_single_window_ratio.sh prev

bind = SUPER, V, togglefloating
bindd = SUPER CTRL, F, Full screen, fullscreen, 0

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Toggle window split (horizontal/vertical)
bind = SUPER, J, layoutmsg, togglesplit

#turn off monitors
#bind = SUPER, P, exec, hyprctl dispatch dpms toggle

