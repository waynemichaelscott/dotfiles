## --- CHROME PROFILE SUBMAP WITH NOTIFICATIONS ---
#
# Profile mapping (verified 2026-05-20):
#   Default    -> waynemichaelscott@gmail.com    (W: Wayne)
#   Profile 3  -> wayne@myadhdtracker.app        (A: ADHD)
#   Profile 9  -> wayne@domusvesta.co            (D: Domus)
#   Profile 4  -> gymstackio@gmail.com           (G: Gymstack)
#
# WARNING: "Profile N" is Chrome's internal ID, assigned as next-free-integer.
# Deleting and re-adding a profile changes the number and silently breaks the binding.
# To re-derive the mapping when something breaks, run:
#
#   for p in ~/.config/google-chrome/Default ~/.config/google-chrome/Profile\ *; do
#     python3 -c "import json,sys; d=json.load(open(sys.argv[1]+'/Preferences')); \
#       ai=d.get('account_info') or [{}]; \
#       print(sys.argv[1].split('/')[-1], '::', ai[0].get('email','?'))" "$p"
#   done


# Stop Chrome from pulling focus to another workspace via xdg_activation.
# Without this, launching a profile that already has a window open feels
# like Chrome "jumps to the existing instance" — it's actually Hyprland
# following Chrome's activation request to the workspace where Chrome already lives.
windowrule = suppress_event activate, match:class ^(google-chrome)$

# 1. Enter the submap and notify the user
bind = SUPER, B, exec, notify-send -t 2000 "Chrome Mode" "A: ADHD | D: Domus | G: Gymstack | W: Wayne | Esc: Cancel"
bind = SUPER, B, submap, chrome

submap = chrome

# 2. Profile Bindings
# NOTE: do NOT pass chrome://newtab (or any URL) here. When the profile is
# already running, Chrome treats a URL arg as "navigate in the existing window"
# and ignores --new-window — making it look like Chrome jumped to the existing
# instance instead of spawning a new window. No URL = clean new window every time.
#
# [workspace +0 silent] = inline one-shot windowrule: open the spawned window
# on the current workspace (+0 = relative offset zero), silent = don't switch.
bind = , A, exec, [workspace +0 silent] google-chrome-stable --profile-directory="Profile 3" --new-window
bind = , A, exec, notify-send "Chrome" "Launching ADHD Profile"
bind = , A, submap, reset

bind = , D, exec, [workspace +0 silent] google-chrome-stable --profile-directory="Profile 9" --new-window
bind = , D, exec, notify-send "Chrome" "Launching Domus Vesta"
bind = , D, submap, reset

bind = , G, exec, [workspace +0 silent] google-chrome-stable --profile-directory="Profile 4" --new-window
bind = , G, exec, notify-send "Chrome" "Launching Gymstack Profile"
bind = , G, submap, reset

bind = , W, exec, [workspace +0 silent] google-chrome-stable --profile-directory="Default" --new-window
bind = , W, exec, notify-send "Chrome" "Launching Wayne Profile"
bind = , W, submap, reset

# 3. Escape hatch with notification
bind = , escape, exec, notify-send -t 1000 "Chrome Mode" "Cancelled"
bind = , escape, submap, reset

submap = reset
