# Host-specific window rules for max.
# Workspace numbers reflect this host's layout — see hosts/max/waybar/config.jsonc.

# Android Emulator → workspace 4 (Dev)
windowrule = workspace 4, match:class ^(Emulator)$

# Lazygit + Lazydocker → workspace 11 (Terminal)
# Prefix match catches both `lazygit` and the `lazygit-pick` wrapper app-id.
windowrule = workspace 11, match:class ^(org\.omarchy\.lazygit.*)$
windowrule = workspace 11, match:class ^(org\.omarchy\.lazydocker)$

# xfreerdp / MacinCloud (FF754) → workspace 10 (Monitoring) on the 4K DP-1.
# Override the shared `monitor 0` rule (which targets HDMI-A-1) so the
# 3840x2160 fullscreen RDP lands on the primary 4K display, not the glance screen.
windowruleV2 = monitor DP-1, class:^(xfreerdp)$
windowruleV2 = workspace 10, class:^(xfreerdp)$, title:^(.*FF754.*)$

# Glance apps → workspace 1 (HDMI-A-1 secondary glance screen).
# These override the shared special:scratchpad rules in hypr/hyprland.conf:
# last matching rule wins, and this host file is sourced after the shared ones.
# silent = place them there without pulling focus to the secondary on launch.
# (Spotify's class is "Spotify" on this build, so the shared lowercase
# ^(spotify)$ scratchpad rule never matched it — match both cases here.)
windowrule = workspace 1 silent, match:class ^([Ss]potify)$
windowrule = workspace 1 silent, match:class ^(chrome-web\.whatsapp\.com__.*)$
# OmNote intentionally NOT pinned here — it falls back to the shared
# special:scratchpad rule in hypr/hyprland.conf (toggle it with the scratchpad).
