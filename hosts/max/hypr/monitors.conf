# See https://wiki.hypr.land/Configuring/Monitors/

# Change to 1 if on a 1x display (then change last "auto" to 1 in monitor=)
# Change to something like 1.75 for fractional scaling (can work well with 1.66667 monitor scaling)
# Note: You must relaunch Hyprland after changing any env like this (use Super+Esc, then Relaunch)
env = GDK_SCALE,1

# --- Resilient dual-monitor layout ---
# The primary monitor is anchored at 0x0 so the desktop is always correct even
# when the secondary monitor is unplugged or undetected. The secondary monitor
# uses relative auto-placement (auto-center-up = centered above the primary),
# which simply does nothing when that monitor is absent instead of leaving a
# phantom gap. A trailing catch-all rule handles any other/unknown monitor.

# Primary Monitor (DP-1) - anchor at origin
monitor = DP-1, 3840x2160@120, 0x0, 1.5

# Secondary Monitor (HDMI-A-1) - placed centered above the primary when present
monitor = HDMI-A-1, 1920x1080@100, auto-center-up, 1

# Fallback for any monitor not matched above (new/unknown displays)
monitor = , preferred, auto, 1

# --- Primary Monitor (DP-1) Workspaces 3-5 ---
workspace = 3, monitor:DP-1,default:true, persistent:true
workspace = 4, monitor:DP-1,persistent:true
workspace = 5, monitor:DP-1,persistent:true

# --- Secondary Monitor (HDMI-A-1) Workspaces 1-2 (at-a-glance: notes, chat, etc.) ---
# On hot-unplug, Hyprland relocates any already-open workspace here onto a
# surviving monitor. Note: while HDMI-A-1 is absent these stay reachable on
# demand but do not pre-materialize as persistent (no conditional config).
workspace = 1, monitor:HDMI-A-1, default:true,persistent:true
workspace = 2, monitor:HDMI-A-1, persistent:true
