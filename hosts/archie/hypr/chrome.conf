# 1. Enter the submap and notify the user
bind = SUPER, B, exec, notify-send -t 0 "Chrome Mode" "A: ADHD | D: Domus | G: Gymstack | W: Wayne | Esc: Cancel"
bind = SUPER, B, submap, chrome

submap = chrome

# 2. Profile Bindings — UPDATE PROFILE DIRECTORIES FOR THIS HOST
bind = , A, exec, google-chrome-stable --new-window --profile-directory="Profile 2"
bind = , A, exec, notify-send "Chrome" "Launching ADHD Profile"
bind = , A, submap, reset

bind = , D, exec, google-chrome-stable --new-window --profile-directory="Profile 6"
bind = , D, exec, notify-send "Chrome" "Launching Domus Vesta"
bind = , D, submap, reset

bind = , G, exec, google-chrome-stable --new-window --profile-directory="Profile 3"
bind = , G, exec, notify-send "Chrome" "Launching Gymstack Profile"
bind = , G, submap, reset

bind = , W, exec, google-chrome-stable --new-window --profile-directory="Default"
bind = , W, exec, notify-send "Chrome" "Launching Wayne Profile"
bind = , W, submap, reset

# 3. Escape hatch with notification
bind = , escape, exec, notify-send -t 1000 "Chrome Mode" "Cancelled"
bind = , escape, submap, reset

submap = reset
