## --- CHROME PROFILE SUBMAP WITH NOTIFICATIONS ---
#
# Profile mapping (verified 2026-07-04):
#   Default    -> waynemichaelscott@gmail.com    (W: Wayne)
#   Profile 2  -> wayne@myadhdtracker.app        (A: ADHD)
#   Profile 3  -> gymstackio@gmail.com           (G: Gymstack)
#   Profile 6  -> wayne@domusvesta.co            (D: Domus)
#
# Each profile launches with --class=chrome-<label> so that
# hyprland-autoname-workspaces can show per-profile icons in Waybar.

# Stop Chrome from pulling focus to another workspace via xdg_activation.
windowrule = suppress_event activate, match:class ^(google-chrome|chrome-.*)$

# 1. Enter the submap and notify the user
bind = SUPER, B, exec, notify-send -t 2000 "Chrome Mode" "A: ADHD | D: Domus | G: Gymstack | W: Wayne | Esc: Cancel"
bind = SUPER, B, submap, chrome

submap = chrome

# 2. Profile Bindings
bind = , A, exec, [workspace +0 silent] google-chrome-stable --new-window --class=chrome-adhd --profile-directory="Profile 2"
bind = , A, exec, makoctl dismiss --all && notify-send -t 1500 "Chrome" "Launching ADHD Profile"
bind = , A, submap, reset

bind = , D, exec, [workspace +0 silent] google-chrome-stable --new-window --class=chrome-dv --profile-directory="Profile 6"
bind = , D, exec, makoctl dismiss --all && notify-send -t 1500 "Chrome" "Launching Domus Vesta"
bind = , D, submap, reset

bind = , G, exec, [workspace +0 silent] google-chrome-stable --new-window --class=chrome-gymstack --profile-directory="Profile 3"
bind = , G, exec, makoctl dismiss --all && notify-send -t 1500 "Chrome" "Launching Gymstack Profile"
bind = , G, submap, reset

bind = , W, exec, [workspace +0 silent] google-chrome-stable --new-window --class=chrome-personal --profile-directory="Default"
bind = , W, exec, makoctl dismiss --all && notify-send -t 1500 "Chrome" "Launching Wayne Profile"
bind = , W, submap, reset

# 3. Escape hatch with notification
bind = , escape, exec, makoctl dismiss --all
bind = , escape, submap, reset

submap = reset
