include ~/.config/omarchy/current/theme/kitty.conf

# Font
font_family JetBrainsMono Nerd Font Mono
bold_italic_font auto
font_size        12.0

# Window
window_padding_width 14
window_padding_height 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0
background_opacity 0.7

# Keybindings
map F11 toggle_fullscreen
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Allow remote access
single_instance yes
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
enable_audio_bell no
background_blur 24
dim_opacity 0.6

# Smooth tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         round
tab_bar_margin_width        8
tab_bar_margin_height       6 0
active_tab_font_style       bold
inactive_tab_font_style     normal
inactive_tab_background     #0d1433
inactive_tab_foreground     #6d7db6
tab_title_template          {fmt.fg.default}{title}{' [{num_windows}]' if num_windows > 1 else ''}
